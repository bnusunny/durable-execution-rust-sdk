[workspace]
# Generate changelog from conventional commits
changelog_config = "cliff.toml"
# Create git tags for releases
git_tag_enable = true
# Create GitHub releases
git_release_enable = true
# Auto-detect prerelease from version string (e.g. 0.1.0-alpha3)
git_release_type = "auto"

# Don't publish the examples package
[[package]]
name = "durable-execution-sdk-examples"
publish = false
changelog_update = false

# Publish order is handled automatically based on dependencies:
# 1. durable-execution-sdk-macros (no deps)
# 2. durable-execution-sdk (depends on macros)
# 3. durable-execution-sdk-testing (depends on sdk)
