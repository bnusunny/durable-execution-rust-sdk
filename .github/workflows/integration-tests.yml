name: Integration Tests

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aws-durable-execution-sdk/target
          key: ${{ runner.os }}-cargo-integ-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integ-

      - name: Configure AWS credentials
        if: github.actor != 'nektos/act'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_INTEGRATION_ROLE_ARN }}
          role-session-name: rust-sdk-integration-test
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Build test Lambda functions
        working-directory: aws-durable-execution-sdk
        run: cargo build --release --package durable-execution-sdk-examples

      - name: Deploy test functions
        id: deploy
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          FUNCTION_PREFIX: durable-rust-integ-${{ github.run_id }}
        run: |
          ROLE_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/DurableFunctionsIntegrationTestRole"

          for binary in simple_workflow parallel_processing callback_workflow; do
            FUNC_NAME="${FUNCTION_PREFIX}-${binary}"
            BIN_PATH="aws-durable-execution-sdk/target/release/${binary}"

            # Package the binary
            WORK_DIR=$(mktemp -d)
            cp ${BIN_PATH} ${WORK_DIR}/bootstrap
            chmod +x ${WORK_DIR}/bootstrap
            (cd ${WORK_DIR} && zip -j /tmp/${binary}.zip bootstrap)

            echo "Deploying ${FUNC_NAME}..."
            aws lambda create-function \
              --function-name "${FUNC_NAME}" \
              --runtime python3.13 \
              --handler bootstrap \
              --role "${ROLE_ARN}" \
              --zip-file "fileb:///tmp/${binary}.zip" \
              --timeout 300 \
              --memory-size 256 \
              --environment "Variables={AWS_LAMBDA_EXEC_WRAPPER=/var/task/bootstrap}" \
              --durable-config '{"ExecutionTimeout":900,"RetentionPeriodInDays":7}' \
              --region "${AWS_REGION}" \
              --no-cli-pager

            echo "Waiting for ${FUNC_NAME} to become active..."
            aws lambda wait function-active-v2 \
              --function-name "${FUNC_NAME}" \
              --region "${AWS_REGION}"

            echo "Deployed ${FUNC_NAME}"
          done

          # Export function names for test step
          echo "SIMPLE_WORKFLOW_FUNCTION=${FUNCTION_PREFIX}-simple_workflow" >> $GITHUB_OUTPUT
          echo "PARALLEL_PROCESSING_FUNCTION=${FUNCTION_PREFIX}-parallel_processing" >> $GITHUB_OUTPUT
          echo "CALLBACK_WORKFLOW_FUNCTION=${FUNCTION_PREFIX}-callback_workflow" >> $GITHUB_OUTPUT

      - name: Run integration tests
        working-directory: aws-durable-execution-sdk
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          SIMPLE_WORKFLOW_FUNCTION: ${{ steps.deploy.outputs.SIMPLE_WORKFLOW_FUNCTION }}
          PARALLEL_PROCESSING_FUNCTION: ${{ steps.deploy.outputs.PARALLEL_PROCESSING_FUNCTION }}
          CALLBACK_WORKFLOW_FUNCTION: ${{ steps.deploy.outputs.CALLBACK_WORKFLOW_FUNCTION }}
        run: cargo test --package durable-execution-sdk-testing --test integration -- --ignored

      - name: Cleanup test functions
        if: always()
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          FUNCTION_PREFIX: durable-rust-integ-${{ github.run_id }}
        run: |
          for binary in simple_workflow parallel_processing callback_workflow; do
            FUNC_NAME="${FUNCTION_PREFIX}-${binary}"
            echo "Deleting ${FUNC_NAME}..."
            aws lambda delete-function \
              --function-name "${FUNC_NAME}" \
              --region "${AWS_REGION}" 2>/dev/null || true
          done
