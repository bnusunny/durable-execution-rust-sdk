name: Benchmark

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            durable-execution-sdk/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Check for benchmarks
        id: check
        working-directory: durable-execution-sdk
        run: |
          if find . -path '*/benches/*.rs' | grep -q .; then
            echo "has_benchmarks=true" >> $GITHUB_OUTPUT
          else
            echo "has_benchmarks=false" >> $GITHUB_OUTPUT
            echo "No benchmarks found in workspace. Skipping."
          fi

      - name: Run benchmarks
        if: steps.check.outputs.has_benchmarks == 'true'
        working-directory: durable-execution-sdk
        run: cargo bench --workspace --all-features -- --output-format bencher | tee output.txt

      - name: Store benchmark result
        if: steps.check.outputs.has_benchmarks == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: durable-execution-sdk/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
