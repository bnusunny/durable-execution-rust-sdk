version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/durable-execution-sdk"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      aws-sdk:
        patterns:
          - "aws-*"
      tokio:
        patterns:
          - "tokio*"
      serde:
        patterns:
          - "serde*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Node.js dependencies for conformance tests
  - package-ecosystem: "npm"
    directory: "/conformance-tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
